version: "3.8"

services:
  mysql:
    image: mysql:5.7
    container_name: hridoc-mysql
    ports:
      - "13306:3306"
    volumes:
      - ${DATA_DIR}/mysql/data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${PASSWORD}
      MYSQL_DATABASE: hridoc
    restart: always

  redis:
    image: redis:7-alpine
    container_name: hridoc-redis
    ports:
      - "16379:6379"
    environment:
      TZ: Asia/Shanghai
    restart: always
    command: redis-server --requirepass ${PASSWORD} --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: hridoc-minio
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - ${DATA_DIR}/minio:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    restart: always
    command: server /data --console-address ":9001"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hridoc-api
    ports:
      - "8888:8888"
    volumes:
      - ./api/etc/api.yaml:/app/etc/api.yaml:ro
      - ${DATA_DIR}/fonts:/app/fonts:ro
      - ${DATA_DIR}/tmp:/tmp/hridoc
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - mysql
      - redis
      - minio
    restart: always

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: hridoc-web
    ports:
      - "80:80"
    restart: always
