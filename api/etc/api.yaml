Name: hridoc-api
Host: 0.0.0.0
Port: 8889

Mysql:
  DataSource: root:123456@tcp(localhost:3306)/hridoc?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai

CacheRedis:
  Host: localhost:6379
  Pass: "123456"
  Type: node

JwtAuth:
  AccessSecret: hridoc-secret-key-change-in-production
  AccessExpire: 86400

MinIO:
  Endpoint: localhost:19000
  AccessKey: minioadmin
  SecretKey: minioadmin
  Bucket: hridoc-bucket
  UseSSL: false
  PresignedExpiry: 300

Watermark:
  FontPath: ./fonts/simhei.ttf
  DefaultText: "仅供公司内部使用"

Upload:
  MaxFileSize: 10485760
  AllowedTypes:
    - image/jpeg
    - image/png
    - image/jpg
    - application/pdf

Excel:
  MaxRows: 1000

Export:
  TempDir: ./tmp/exports
  CleanupDays: 7
